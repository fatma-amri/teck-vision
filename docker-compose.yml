# Teck-Vision — Stack Docker Compose
# Plateforme CTF DevSecOps

services:
  teck-vision:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - UPLOAD_FOLDER=/var/uploads
      # Host/env overrides (Elastic Beanstalk exports these before `docker compose up`).
      # Local fallback keeps MariaDB + Redis containers working without exporting vars.
      - DATABASE_URL=${DATABASE_URL:-mysql+pymysql://teck_vision:teck_vision@db/teck_vision}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
      - SECRET_KEY=${SECRET_KEY:-}
      - WORKERS=${WORKERS:-1}
      - LOG_FOLDER=/var/log/teck-vision
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
    volumes:
      - .data/teck-vision/logs:/var/log/teck-vision
      - .data/teck-vision/uploads:/var/uploads
      # Do NOT bind-mount source over /opt/teck-vision on Elastic Beanstalk: the deploy dir is often
      # read-only at the host level, which breaks `.ctfd_secret_key` + filesystem cache writes.
      # Code comes from the built image; override this locally via docker-compose.override.yml if needed.
    depends_on:
      - db
    networks:
        default:
        internal:

  nginx:
    image: nginx:stable
    restart: always
    volumes:
      - ./conf/nginx/http.conf:/etc/nginx/nginx.conf
    ports:
      # Elastic Beanstalk forwards ALB traffic to instance port 80 (process default).
      # Mapping nginx here avoids “healthy container but 502 from ELB” when nginx only listens on 8080.
      - "80:80"
    depends_on:
      - teck-vision

  db:
    image: mariadb:10.11
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=teck_vision
      - MARIADB_USER=teck_vision
      - MARIADB_PASSWORD=teck_vision
      - MARIADB_DATABASE=teck_vision
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - .data/mysql:/var/lib/mysql
    networks:
        internal:
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --wait_timeout=28800, --log-warnings=0]

  cache:
    image: redis:4
    restart: always
    volumes:
    - .data/redis:/data
    networks:
        internal:

networks:
    default:
    internal:
        internal: true
